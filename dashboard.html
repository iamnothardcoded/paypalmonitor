<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Payment Monitor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0d0d12;
      --bg-secondary: #16161d;
      --bg-card: #1c1c26;
      --border: #2a2a3a;
      --text-primary: #ffffff;
      --text-secondary: #8b8b9e;
      --text-muted: #5a5a6e;
      --accent: #00d4aa;
      --accent-dim: rgba(0, 212, 170, 0.15);
      --error: #ff4757;
      --error-dim: rgba(255, 71, 87, 0.15);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .status-dot.offline {
      background: var(--error);
      box-shadow: 0 0 8px var(--error);
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* PIN Screen */
    #pin-screen {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .pin-header {
      margin-bottom: 40px;
    }

    .pin-icon {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      object-fit: contain;
      margin: 0 auto 20px;
    }

    .pin-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .pin-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    #pin-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      height: 48px;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      transition: all 0.15s ease;
    }

    .pin-dot.filled {
      background: var(--accent);
      border-color: var(--accent);
    }

    .pin-dot.error {
      border-color: var(--error);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 280px;
      margin: 0 auto;
    }

    .pin-btn {
      aspect-ratio: 1;
      font-size: 24px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .pin-btn:hover {
      background: var(--bg-secondary);
      border-color: var(--text-muted);
    }

    .pin-btn:active {
      transform: scale(0.95);
      background: var(--border);
    }

    .pin-btn.secondary {
      background: transparent;
      border-color: transparent;
      color: var(--text-secondary);
      font-size: 18px;
    }

    .pin-btn.secondary:hover {
      color: var(--text-primary);
      background: var(--bg-card);
    }

    /* Dashboard */
    #dashboard {
      display: none;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .payment-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      margin-bottom: 16px;
    }

    .payment-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .payment-amount {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    .payment-amount .currency {
      font-size: 36px;
      font-weight: 600;
      color: var(--text-secondary);
      vertical-align: top;
      margin-right: 4px;
    }

    .payment-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .payment-payer {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .payment-time {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .payment-waiting {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Summary card (shown on hold) */
    .summary-card {
      display: none;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
    }

    .summary-card.visible {
      display: block;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .summary-label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .summary-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Footer */
    .footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
    }

    .footer-logo {
      height: 20px;
      width: auto;
      color: var(--text-muted);
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pulse {
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
  </style>
</head>
<body>
  <!-- Header (shown when dashboard is visible) -->
  <header class="header" id="header" style="display: none;">
    <div class="header-brand">
      <img class="header-logo" src="/assets/logo.svg" alt="Logo">
      <div>
        <div class="header-title">Payment Monitor</div>
        <div class="header-subtitle">Live Transactions</div>
      </div>
    </div>
    <div class="status-badge">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connected</span>
    </div>
  </header>

  <main class="main">
    <!-- PIN Screen -->
    <div id="pin-screen">
      <div class="pin-header">
        <img class="pin-icon" src="/assets/logo.svg" alt="Logo">
        <h1 class="pin-title">Enter PIN</h1>
        <p class="pin-subtitle">Enter your 4-digit access code</p>
      </div>

      <div id="pin-display">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
      </div>

      <div class="pin-pad">
        <button class="pin-btn" onclick="enterPin('1')">1</button>
        <button class="pin-btn" onclick="enterPin('2')">2</button>
        <button class="pin-btn" onclick="enterPin('3')">3</button>
        <button class="pin-btn" onclick="enterPin('4')">4</button>
        <button class="pin-btn" onclick="enterPin('5')">5</button>
        <button class="pin-btn" onclick="enterPin('6')">6</button>
        <button class="pin-btn" onclick="enterPin('7')">7</button>
        <button class="pin-btn" onclick="enterPin('8')">8</button>
        <button class="pin-btn" onclick="enterPin('9')">9</button>
        <button class="pin-btn secondary" onclick="clearPin()">⌫</button>
        <button class="pin-btn" onclick="enterPin('0')">0</button>
        <button class="pin-btn secondary" onclick="clearPin(true)">C</button>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
      <div class="payment-card" id="payment-card" ontouchstart="holdStart(event)" ontouchend="holdEnd(event)" onmousedown="holdStart(event)" onmouseup="holdEnd(event)">
        <div class="payment-label">Last Payment Received</div>
        <div class="payment-amount" id="payment-amount">
          <span class="currency">€</span><span id="amount-value">—</span>
        </div>
        <div class="payment-meta">
          <div class="payment-payer" id="payer-name"></div>
          <div class="payment-time" id="payment-time">
            <span class="payment-waiting">Waiting for payment...</span>
          </div>
        </div>
      </div>

      <div class="summary-card" id="summary-card">
        <div class="summary-row">
          <span class="summary-label">Today's Total</span>
          <span class="summary-value" id="total-value">€0.00</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" id="footer" style="display: none;">
    <svg class="footer-logo" viewBox="0 0 124 33" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

    </svg>
  </footer>

  <script>
    const PIN = '1234';
    const AUTH_KEY = 'paypal_dash_auth';
    let pin = '';
    let lastId = null;
    let count = 0;
    let total = 0;
    let holdTimer = null;

    // Check if already authenticated
    function checkAuth() {
      if (localStorage.getItem(AUTH_KEY) === 'true') {
        unlock();
      }
    }

    function updatePinDisplay() {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById(`dot-${i}`);
        dot.classList.toggle('filled', i < pin.length);
      }
    }

    function showPinError() {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach(dot => {
        dot.classList.add('error');
        setTimeout(() => dot.classList.remove('error'), 400);
      });
      navigator.vibrate && navigator.vibrate(200);
    }

    function enterPin(digit) {
      if (pin.length < 4) {
        pin += digit;
        updatePinDisplay();

        if (pin.length === 4) {
          if (pin === PIN) {
            setTimeout(unlock, 150);
          } else {
            showPinError();
            pin = '';
            setTimeout(updatePinDisplay, 400);
          }
        }
      }
    }

    function clearPin(all) {
      pin = all ? '' : pin.slice(0, -1);
      updatePinDisplay();
    }

    function unlock() {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('dashboard').classList.add('fade-in');
      document.getElementById('header').style.display = 'flex';
      document.getElementById('footer').style.display = 'flex';
      localStorage.setItem(AUTH_KEY, 'true');
      poll();
      setInterval(poll, 3000);
    }

    function holdStart(e) {
      e && e.preventDefault();
      holdTimer = setTimeout(() => {
        document.getElementById('summary-card').classList.add('visible');
      }, 800);
    }

    function holdEnd(e) {
      e && e.preventDefault();
      clearTimeout(holdTimer);
      document.getElementById('summary-card').classList.remove('visible');
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) {}
    }

    function setConnected(connected) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.classList.toggle('offline', !connected);
      text.textContent = connected ? 'Connected' : 'Offline';
    }

    async function poll() {
      try {
        const res = await fetch('/api/payments/today');
        const data = await res.json();
        setConnected(true);

        if (data.length > count && count > 0) {
          beep();
          navigator.vibrate && navigator.vibrate([100, 50, 100]);
          document.getElementById('payment-card').classList.add('pulse');
          setTimeout(() => {
            document.getElementById('payment-card').classList.remove('pulse');
          }, 600);
        }

        count = data.length;
        total = data.reduce((sum, p) => sum + parseFloat(p.amount), 0);
        document.getElementById('total-value').textContent = '€' + total.toFixed(2) + ' (' + count + ')';

        if (data.length > 0) {
          const last = data[data.length - 1];
          if (last.id !== lastId) {
            document.getElementById('amount-value').textContent = parseFloat(last.amount).toFixed(2);
            document.getElementById('payer-name').textContent = last.payer_name || last.payer || '';

            const ts = last.timestamp || last.time;
            if (ts) {
              document.getElementById('payment-time').textContent = new Date(ts).toLocaleTimeString('de-DE', {
                hour: '2-digit',
                minute: '2-digit'
              });
            }
            lastId = last.id;
          }
        }
      } catch (e) {
        setConnected(false);
      }
    }

    // Initialize
    checkAuth();
  </script>
</body>
</html>
